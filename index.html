<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HU Registrar | Pro Suite 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db; --bg: #f4f7fa;
            --sidebar: #1a252f; --success: #27ae60; --danger: #e74c3c;
            --warning: #f39c12; --border: #e1e8ed; --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; background: var(--bg); height: 100vh; overflow: hidden; }
        
        .sidebar { width: 260px; background: var(--sidebar); color: white; display: flex; flex-direction: column; flex-shrink: 0; transition: 0.3s; position: relative; }
        .sidebar.collapsed { width: 70px; }
        .sidebar.collapsed .sidebar-brand, .sidebar.collapsed .nav-text { display: none; }
        .toggle-btn { position: absolute; right: -15px; top: 25px; background: var(--accent); color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid white; z-index: 100; }
        .sidebar-brand { padding: 30px 20px; font-size: 22px; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; color: var(--accent); }
        .nav-item { padding: 18px 25px; cursor: pointer; display: flex; align-items: center; color: #95a5a6; transition: 0.2s; white-space: nowrap; }
        .nav-item:hover { color: white; background: rgba(255,255,255,0.05); }
        .nav-item.active { background: rgba(255,255,255,0.05); color: white; border-left: 4px solid var(--accent); }
        .main { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 75px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .content { padding: 30px; overflow-y: auto; flex-grow: 1; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: var(--shadow); border-top: 4px solid var(--accent); }
        .stat-val { font-size: 24px; font-weight: 800; }
        .card { background: white; border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; margin-bottom: 25px; padding: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; font-size: 14px; border-bottom: 2px solid #eee; color: #7f8c8d; }
        td { padding: 12px; border-bottom: 1px solid #f9f9f9; font-size: 15px; }
        .btn { padding: 10px 18px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-family: inherit; }
        .btn-primary { background: var(--accent); color: white; }
        .badge { background: #eee; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 6px; width: 100%; margin-top: 8px; box-sizing: border-box; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 600px; max-height: 90vh; overflow-y: auto; }
        .pane-box { flex: 1; border: 1px solid #ddd; border-radius: 6px; height: 180px; overflow-y: auto; background: white; }
        .pane-item { padding: 8px; border-bottom: 1px solid #f1f1f1; cursor: pointer; display: flex; justify-content: space-between; font-size: 13px; }
        
        .row-complete { background-color: #e8f5e9 !important; border-left: 5px solid var(--success); }
        .row-locked { opacity: 0.6; pointer-events: none; background-color: #fcfcfc; }
        .time-tag { font-size: 10px; color: #95a5a6; display: block; margin-top: 2px; }

        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; padding: 40px; }
        }
    </style>
</head>
<body onload="checkSession()">

    <div id="printArea" style="display:none;"></div>

    <div id="loginScreen" style="position:fixed; inset:0; background:var(--sidebar); display:flex; align-items:center; justify-content:center; z-index:10000;">
        <div style="background: white; padding: 45px; border-radius: 20px; width: 350px; text-align: center;">
            <h2 style="color: var(--primary);">HU Registrar</h2>
            <input type="text" id="lUser" placeholder="Login ID" autofocus>
            <input type="password" id="lPass" placeholder="Password" style="margin: 20px 0;" onkeypress="if(event.key==='Enter') doLogin()">
            <button class="btn btn-primary" style="width:100%; justify-content: center;" onclick="doLogin()">Login</button>
        </div>
    </div>

    <div id="appModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-top:0;"></h3>
            <div id="modalBody"></div>
            <div id="modalFooter" style="margin-top:25px; display:flex; gap:10px; justify-content: flex-end;"></div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="toggle-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
        <div class="sidebar-brand">HU Registrar</div>
        <div class="nav-item active" onclick="nav('view-dash', this)"><i class="fas fa-chart-line"></i> <span class="nav-text">Dashboard</span></div>
        <div class="nav-item" onclick="nav('view-reg', this)"><i class="fas fa-user-plus"></i> <span class="nav-text">New Entry</span></div>
        <div id="nav-u" class="nav-item" style="display:none;" onclick="nav('view-users', this)"><i class="fas fa-users-cog"></i> <span class="nav-text">Staff Manager</span></div>
        <div id="nav-s" class="nav-item" style="display:none;" onclick="nav('view-set', this)"><i class="fas fa-cogs"></i> <span class="nav-text">System Settings</span></div>
        <div class="nav-item" style="margin-top:auto;" onclick="doLogout()"><i class="fas fa-power-off"></i> <span class="nav-text">Logout</span></div>
    </div>

    <div class="main">
        <div class="header">
            <h2 id="pageTitle">Dashboard</h2>
            <div id="userBadge" style="font-weight:700; color:var(--accent);"></div>
        </div>
        <div class="content">
            <div id="view-dash" class="section">
                <div class="stats-grid">
                    <div class="stat-card"><div>Total Cases</div><div class="stat-val" id="stTotal">0</div></div>
                    <div class="stat-card" style="border-color: var(--warning);"><div>In Transit</div><div class="stat-val" id="stProgress">0</div></div>
                    <div class="stat-card" style="border-color: var(--success);"><div>Completed</div><div class="stat-val" id="stDone">0</div></div>
                    <div class="stat-card" style="border-color: var(--danger);"><div>Active Staff</div><div class="stat-val" id="stStaff">0</div></div>
                </div>
                <div class="card">
                    <input type="text" id="searchTerm" placeholder="Search students..." oninput="render()" style="margin-bottom: 15px;">
                    <table>
                        <thead><tr><th>Student Name</th><th>Case Details</th><th>Step</th><th>Move To</th><th>Actions</th></tr></thead>
                        <tbody id="dashTable"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-reg" class="section" style="display:none;">
                <div class="card" style="max-width: 800px; margin: 0 auto;">
                    <h3>Registration</h3>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <input type="text" id="inName" placeholder="NAME" style="text-transform: uppercase;">
                        <input type="text" id="inDept" placeholder="Department">
                    </div>
                    <div style="margin-top:15px;">
                        <label>Select Services:</label>
                        <div style="display:flex; gap:10px; margin-top:5px;">
                            <div class="pane-box" id="availServ"></div>
                            <div class="pane-box" id="selServ" style="background:#f0fdf4;"></div>
                        </div>
                    </div>
                    <button class="btn btn-primary" style="width:100%; margin-top:20px; justify-content:center;" onclick="saveNewReq()">Register Student</button>
                </div>
            </div>

            <div id="view-set" class="section" style="display:none;">
                <div class="card">
                    <h4>System Backup</h4>
                    <button class="btn btn-primary" onclick="exportData()">Export Data</button>
                </div>
            </div>
            
            <div id="view-users" class="section" style="display:none;">
                <div class="card"><h4>Staff Management is available for Admin</h4></div>
            </div>
        </div>
    </div>

<script>
    let config = JSON.parse(localStorage.getItem('hu_config')) || { services: ["Degree", "Transcript", "Letter", "ID Card"], roles: ["Registrar", "Finance", "Library", "Department"], rooms: ["Office-01", "Office-02", "Office-03"] };
    let users = JSON.parse(localStorage.getItem('hu_users')) || [{name:"Admin", login:"admin", pass:"admin123", userRoles:["Admin"], office:"HQ", isActive:true}];
    let reqs = JSON.parse(localStorage.getItem('hu_reqs')) || [];
    let currentUser = null, tmpS = [];

    // --- Authentication & Session ---
    function doLogin() {
        const u = document.getElementById('lUser').value, p = document.getElementById('lPass').value;
        const found = users.find(x => x.login === u && x.pass === p);
        if(found && found.isActive) {
            currentUser = found;
            sessionStorage.setItem('activeUser', JSON.stringify(found)); // Store session
            document.getElementById('loginScreen').style.display='none';
            render();
        } else alert("Invalid credentials!");
    }

    function checkSession() {
        const saved = sessionStorage.getItem('activeUser');
        if(saved) {
            currentUser = JSON.parse(saved);
            document.getElementById('loginScreen').style.display='none';
            render();
        }
    }

    function doLogout() {
        sessionStorage.clear();
        location.reload();
    }

    // --- Core Logic ---
    function render() {
        if(!currentUser) return;
        const term = document.getElementById('searchTerm').value.toUpperCase();
        
        document.getElementById('stTotal').innerText = reqs.length;
        document.getElementById('stProgress').innerText = reqs.filter(r => r.step !== 'COMPLETE').length;
        document.getElementById('stDone').innerText = reqs.filter(r => r.step === 'COMPLETE').length;
        document.getElementById('userBadge').innerText = currentUser.name;
        document.getElementById('nav-u').style.display = currentUser.userRoles.includes("Admin") ? "flex" : "none";
        document.getElementById('nav-s').style.display = currentUser.userRoles.includes("Admin") ? "flex" : "none";

        document.getElementById('dashTable').innerHTML = reqs.filter(r => r.name.includes(term)).map((r, i) => {
            const isDone = r.step === 'COMPLETE';
            const isLocked = !currentUser.userRoles.includes("Admin") && !currentUser.userRoles.includes(r.step) && !isDone;
            return `<tr class="${isDone ? 'row-complete' : ''} ${isLocked ? 'row-locked' : ''}">
                <td><b onclick="openHist(${i})" style="cursor:pointer; color:var(--accent);">${r.name}</b></td>
                <td>
                    ${r.servs.join(", ")} 
                    <i class="fas fa-edit" onclick="editServs(${i})" style="cursor:pointer; font-size:10px; margin-left:5px; color:#aaa;"></i>
                </td>
                <td><span class="badge">${r.step}</span></td>
                <td>
                    <select id="nr-${i}" style="padding:4px; font-size:11px;">
                        ${config.roles.map(x=>`<option ${r.step===x?'selected':''}>${x}</option>`).join('')}
                        <option value="COMPLETE" ${isDone?'selected':''}>COMPLETE</option>
                    </select>
                </td>
                <td>
                    ${!isDone ? `<button class="btn btn-primary" style="padding:5px 10px;" onclick="forward(${i})">Send</button>` : 'Done'}
                </td>
            </tr>`;
        }).join('');

        renderPanes();
    }

    function renderPanes() {
        document.getElementById('availServ').innerHTML = config.services.filter(x => !tmpS.includes(x)).map(x => `<div class="pane-item" onclick="tmpS.push('${x}'); renderPanes();">${x} <i class="fas fa-plus"></i></div>`).join('');
        document.getElementById('selServ').innerHTML = tmpS.map(x => `<div class="pane-item" onclick="tmpS=tmpS.filter(v=>v!=='${x}'); renderPanes();">${x} <i class="fas fa-times"></i></div>`).join('');
    }

    function saveNewReq() {
        const n = document.getElementById('inName').value;
        if(!n || tmpS.length === 0) return alert("Fill Name and Services");
        reqs.push({
            name: n.toUpperCase(), dept: document.getElementById('inDept').value,
            servs: [...tmpS], step: config.roles[0], room: config.rooms[0],
            history: [{step: "Registration", by: currentUser.name, time: new Date()}]
        });
        tmpS = []; document.getElementById('inName').value = ''; 
        saveAll(); nav('view-dash', document.querySelector('.nav-item'));
    }

    // --- Service Editing After Registration ---
    function editServs(i) {
        const r = reqs[i];
        tmpS = [...r.servs];
        document.getElementById('modalTitle').innerText = "Update Services: " + r.name;
        document.getElementById('modalBody').innerHTML = `
            <div style="display:flex; gap:10px;">
                <div class="pane-box" id="editAvail"></div>
                <div class="pane-box" id="editSel" style="background:#f0fdf4;"></div>
            </div>`;
        
        const updatePanes = () => {
            document.getElementById('editAvail').innerHTML = config.services.filter(x => !tmpS.includes(x)).map(x => `<div class="pane-item" onclick="addEditS('${x}', ${i})">${x} +</div>`).join('');
            document.getElementById('editSel').innerHTML = tmpS.map(x => `<div class="pane-item" onclick="remEditS('${x}', ${i})">${x} x</div>`).join('');
        };
        
        window.addEditS = (s, idx) => { tmpS.push(s); updatePanes(); };
        window.remEditS = (s, idx) => { tmpS = tmpS.filter(v=>v!==s); updatePanes(); };
        
        updatePanes();
        document.getElementById('modalFooter').innerHTML = `<button class="btn btn-primary" onclick="confirmEdit(${i})">Save Changes</button>`;
        document.getElementById('appModal').style.display='flex';
    }

    function confirmEdit(i) {
        reqs[i].servs = [...tmpS];
        reqs[i].history.push({step: "Services Updated", by: currentUser.name, time: new Date()});
        saveAll(); closeModal(); render();
    }

    function forward(i) {
        const next = document.getElementById(`nr-${i}`).value;
        reqs[i].step = next;
        reqs[i].history.push({step: next, by: currentUser.name, time: new Date()});
        saveAll(); render();
    }

    function openHist(i) {
        const r = reqs[i];
        document.getElementById('modalTitle').innerText = r.name + " History";
        document.getElementById('modalBody').innerHTML = r.history.map(h => `
            <div style="margin-bottom:10px; border-left:3px solid var(--accent); padding-left:10px;">
                <b>${h.step}</b> <small>(${new Date(h.time).toLocaleString()})</small><br>
                <small>By: ${h.by}</small>
            </div>`).join('');
        document.getElementById('modalFooter').innerHTML = `<button class="btn" onclick="closeModal()">Close</button>`;
        document.getElementById('appModal').style.display='flex';
    }

    function saveAll() { localStorage.setItem('hu_reqs', JSON.stringify(reqs)); }
    function nav(id, el) { document.querySelectorAll('.section').forEach(s => s.style.display='none'); document.getElementById(id).style.display='block'; document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); render(); }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
    function closeModal() { document.getElementById('appModal').style.display='none'; }
    function exportData() { alert("Data Exported to Console (Check F12)"); console.log(JSON.stringify(reqs)); }
</script>
</body>
</html>
