<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HU Registrar | Live Pro 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db; --bg: #f4f7fa;
            --sidebar: #1a252f; --success: #27ae60; --danger: #e74c3c;
            --warning: #f39c12; --border: #e1e8ed; --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; background: var(--bg); height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar); color: white; display: flex; flex-direction: column; flex-shrink: 0; transition: 0.3s; position: relative; }
        .sidebar.collapsed { width: 70px; }
        .sidebar.collapsed .sidebar-brand, .sidebar.collapsed .nav-text { display: none; }
        .toggle-btn { position: absolute; right: -15px; top: 25px; background: var(--accent); color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid white; z-index: 100; }
        .sidebar-brand { padding: 30px 20px; font-size: 22px; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; color: var(--accent); }
        .nav-item { padding: 18px 25px; cursor: pointer; display: flex; align-items: center; color: #95a5a6; transition: 0.2s; white-space: nowrap; }
        .nav-item:hover { color: white; background: rgba(255,255,255,0.05); }
        .nav-item.active { background: rgba(255,255,255,0.05); color: white; border-left: 4px solid var(--accent); }
        .main { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 75px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .content { padding: 30px; overflow-y: auto; flex-grow: 1; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: var(--shadow); border-top: 4px solid var(--accent); }
        .stat-val { font-size: 24px; font-weight: 800; }
        .card { background: white; border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; margin-bottom: 25px; padding: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; font-size: 14px; border-bottom: 2px solid #eee; color: #7f8c8d; }
        td { padding: 12px; border-bottom: 1px solid #f9f9f9; font-size: 15px; }
        .btn { padding: 10px 18px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
        input, select, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 6px; width: 100%; margin-top: 8px; box-sizing: border-box; font-family: inherit; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 580px; max-height: 90vh; overflow-y: auto; }
        .badge { background: #eee; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
        .pane-box { flex: 1; border: 1px solid #ddd; border-radius: 6px; height: 200px; overflow-y: auto; background: white; }
        .pane-item { padding: 10px; border-bottom: 1px solid #f1f1f1; cursor: pointer; font-size: 14px; }
        #loadingOverlay { position: fixed; inset:0; background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; z-index: 11000; display: none; }
    </style>
</head>
<body>

    <div id="loadingOverlay"><div><i class="fas fa-spinner fa-spin fa-2x"></i> Synchronizing...</div></div>

    <div id="loginScreen" style="position:fixed; inset:0; background:var(--sidebar); display:flex; align-items:center; justify-content:center; z-index:10000;">
        <div style="background: white; padding: 45px; border-radius: 20px; width: 350px; text-align: center;">
            <h2 style="color: var(--primary);">HU Registrar</h2>
            <input type="text" id="lUser" placeholder="Login ID" autofocus>
            <input type="password" id="lPass" placeholder="Password" style="margin: 20px 0;">
            <button class="btn btn-primary" style="width:100%; justify-content: center;" onclick="doLogin()">Login</button>
            <p id="loginError" style="color:red; font-size:12px; margin-top:10px; display:none;">Invalid credentials</p>
        </div>
    </div>

    <div id="appModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-top:0;"></h3>
            <div id="modalBody"></div>
            <div id="modalFooter" style="margin-top:25px; display:flex; gap:10px; justify-content: flex-end;"></div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="toggle-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
        <div class="sidebar-brand">HU Registrar</div>
        <div class="nav-item active" onclick="nav('view-dash', this)"><i class="fas fa-chart-line"></i> <span class="nav-text">Dashboard</span></div>
        <div class="nav-item" onclick="nav('view-reg', this)"><i class="fas fa-user-plus"></i> <span class="nav-text">New Entry</span></div>
        <div id="nav-u" class="nav-item" style="display:none;" onclick="nav('view-users', this)"><i class="fas fa-users-cog"></i> <span class="nav-text">Staff Manager</span></div>
        <div id="nav-s" class="nav-item" style="display:none;" onclick="nav('view-set', this)"><i class="fas fa-cogs"></i> <span class="nav-text">Settings</span></div>
        <div class="nav-item" style="margin-top:auto;" onclick="location.reload()"><i class="fas fa-power-off"></i> <span class="nav-text">Logout</span></div>
    </div>

    <div class="main">
        <div class="header"><h2 id="pageTitle">Dashboard</h2><div id="userBadge" style="font-weight:700; color:var(--accent);"></div></div>
        <div class="content">
            <div id="view-dash" class="section">
                <div class="stats-grid">
                    <div class="stat-card"><div>Total Cases</div><div class="stat-val" id="stTotal">0</div></div>
                    <div class="stat-card" style="border-color: var(--warning);"><div>Pending</div><div class="stat-val" id="stProgress">0</div></div>
                    <div class="stat-card" style="border-color: var(--success);"><div>Completed</div><div class="stat-val" id="stDone">0</div></div>
                    <div class="stat-card" style="border-color: var(--danger);"><div>Staff</div><div class="stat-val" id="stStaff">0</div></div>
                </div>
                <div class="card">
                    <input type="text" id="searchTerm" placeholder="Search students..." oninput="render()" style="margin-bottom:20px;">
                    <table>
                        <thead><tr><th>Student Name</th><th>Department</th><th>Services</th><th>Status</th><th>Action</th></tr></thead>
                        <tbody id="dashTable"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-reg" class="section" style="display:none;">
                <div class="card" style="max-width: 600px; margin: 0 auto;">
                    <h3>New Registration</h3>
                    <input type="text" id="inName" placeholder="Full Name">
                    <input type="text" id="inDept" placeholder="Department">
                    <div style="display:flex; gap:10px; margin-top:15px;">
                        <div style="flex:1;"><small>Available Services</small><div class="pane-box" id="availServ"></div></div>
                        <div style="flex:1;"><small>Selected</small><div class="pane-box" id="selServ"></div></div>
                    </div>
                    <button class="btn btn-primary" style="width:100%; margin-top:20px; justify-content:center;" onclick="saveNewReq()">Save Request</button>
                </div>
            </div>

            <div id="view-users" class="section" style="display:none;">
                <div class="card">
                    <h3>Add Staff</h3>
                    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                        <input type="text" id="uFull" placeholder="Name">
                        <input type="text" id="uId" placeholder="Login ID">
                        <input type="password" id="uPw" placeholder="Password">
                    </div>
                    <button class="btn btn-primary" style="margin-top:10px;" onclick="saveStaff()">Add User</button>
                </div>
                <div class="card"><table><thead><tr><th>Name</th><th>Login</th><th>Status</th><th>Action</th></tr></thead><tbody id="staffTable"></tbody></table></div>
            </div>
        </div>
    </div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyCuA6hUsOEvLDGsXYpVTZa7a7ArUcrP-1c",
        authDomain: "hu-registrar.firebaseapp.com",
        databaseURL: "https://hu-registrar-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "hu-registrar",
        storageBucket: "hu-registrar.firebasestorage.app",
        messagingSenderId: "858714648335",
        appId: "1:858714648335:web:871d31a7a398ba8587987a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let config = { services: ["Original Degree", "Transcript"], roles: ["Registrar", "Finance"], rooms: ["Room 01"] };
    let users = [];
    let reqs = [];
    let currentUser = null, tmpS = [], tmpR = [];

    // --- INITIAL DATA FETCH (Run once at start) ---
    db.ref('users').once('value', (snap) => {
        const val = snap.val();
        users = val ? Object.values(val) : [];
    });

    function doLogin() {
        const u = document.getElementById('lUser').value.trim();
        const p = document.getElementById('lPass').value.trim();
        
        // --- EMERGENCY BYPASS (If DB is empty) ---
        if(u === "admin" && p === "admin123") {
            loginSuccess({name:"Admin", login:"admin", userRoles:["Admin"], office:"Main", isActive:true});
            return;
        }

        const found = users.find(x => x.login === u && x.pass === p);
        if(found) {
            if(found.isActive === false) return alert("Account Deactivated");
            loginSuccess(found);
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }

    function loginSuccess(user) {
        currentUser = user;
        document.getElementById('loginScreen').style.display='none';
        if(user.userRoles.includes("Admin")) {
            document.getElementById('nav-u').style.display = 'flex';
            document.getElementById('nav-s').style.display = 'flex';
        }
        syncData();
    }

    function syncData() {
        document.getElementById('loadingOverlay').style.display = 'flex';
        db.ref('users').on('value', snap => { users = snap.val() ? Object.values(snap.val()) : []; render(); });
        db.ref('reqs').on('value', snap => { reqs = snap.val() ? Object.values(snap.val()) : []; render(); });
        db.ref('config').on('value', snap => { if(snap.val()) config = snap.val(); render(); });
        setTimeout(() => document.getElementById('loadingOverlay').style.display = 'none', 1000);
    }

    function render() {
        if(!currentUser) return;
        document.getElementById('userBadge').innerText = currentUser.name;
        document.getElementById('stTotal').innerText = reqs.length;
        document.getElementById('stStaff').innerText = users.length;

        // Dashboard
        const term = document.getElementById('searchTerm').value.toUpperCase();
        document.getElementById('dashTable').innerHTML = reqs.filter(r => r.name.includes(term)).map(r => `
            <tr>
                <td>${r.name}</td>
                <td>${r.dept}</td>
                <td>${(r.servs||[]).join(", ")}</td>
                <td><span class="badge">${r.step}</span></td>
                <td><button class="btn btn-secondary" onclick="delReq('${r.id}')">Delete</button></td>
            </tr>
        `).join('');

        // Staff
        document.getElementById('staffTable').innerHTML = users.map(u => `
            <tr>
                <td>${u.name}</td><td>${u.login}</td>
                <td>${u.isActive?'Active':'Off'}</td>
                <td><button onclick="delUser('${u.login}')">X</button></td>
            </tr>
        `).join('');

        renderPanes();
    }

    function saveNewReq() {
        const name = document.getElementById('inName').value.toUpperCase();
        if(!name) return alert("Enter Name");
        const id = "R" + Date.now();
        const data = { id, name, dept: document.getElementById('inDept').value, servs: tmpS, step: "START" };
        db.ref('reqs/' + id).set(data);
        tmpS = []; document.getElementById('inName').value = "";
        nav('view-dash', document.querySelector('.nav-item'));
    }

    function saveStaff() {
        const id = document.getElementById('uId').value;
        const data = { name: document.getElementById('uFull').value, login: id, pass: document.getElementById('uPw').value, userRoles: ["Staff"], isActive: true };
        db.ref('users/' + id).set(data);
    }

    function delReq(id) { if(confirm("Delete?")) db.ref('reqs/'+id).remove(); }
    function delUser(id) { if(confirm("Delete?")) db.ref('users/'+id).remove(); }
    function nav(id, el) {
        document.querySelectorAll('.section').forEach(s => s.style.display='none');
        document.getElementById(id).style.display='block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
    function renderPanes() {
        document.getElementById('availServ').innerHTML = config.services.filter(s => !tmpS.includes(s)).map(s => `<div class="pane-item" onclick="tmpS.push('${s}'); renderPanes()">${s}</div>`).join('');
        document.getElementById('selServ').innerHTML = tmpS.map(s => `<div class="pane-item" onclick="tmpS=tmpS.filter(x=>x!==s); renderPanes()">${s}</div>`).join('');
    }
</script>
</body>
</html>
