<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HU Registrar | Cloud Version</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore, collection, getDocs, addDoc, updateDoc,
  deleteDoc, doc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.fb = { auth, db, signInWithEmailAndPassword, onAuthStateChanged, signOut,
collection, getDocs, addDoc, updateDoc, deleteDoc, doc, onSnapshot };
</script>

<style>
/* KEEP YOUR STYLE SAME */
body { font-family: Arial; margin:0; background:#f4f7fa; }
.btn { padding:10px; background:#3498db; color:white; border:none; cursor:pointer; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" style="position:fixed; inset:0; background:#1a252f; display:flex; align-items:center; justify-content:center;">
  <div style="background:white; padding:30px; width:300px;">
    <h3>Login</h3>
    <input id="lUser" placeholder="Email"><br><br>
    <input id="lPass" type="password" placeholder="Password"><br><br>
    <button class="btn" onclick="doLogin()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none; padding:20px;">
  <h2>HU Registrar</h2>
  <button onclick="logout()">Logout</button>

  <h3>Register Student</h3>
  <input id="inName" placeholder="Full Name"><br><br>
  <input id="inDept" placeholder="Department"><br><br>
  <button onclick="saveNewReq()">Save</button>

  <h3>Requests</h3>
  <table border="1" width="100%">
    <thead>
      <tr><th>Name</th><th>Dept</th><th>Status</th><th>Action</th></tr>
    </thead>
    <tbody id="dashTable"></tbody>
  </table>
</div>

<script>

let currentUser = null;
let reqs = [];

// 🔐 LOGIN
async function doLogin(){
  const email = document.getElementById('lUser').value;
  const pass = document.getElementById('lPass').value;

  try{
    await fb.signInWithEmailAndPassword(fb.auth, email, pass);
  }catch(e){
    alert(e.message);
  }
}

// 🔓 LOGOUT
function logout(){
  fb.signOut(fb.auth);
}

// 🔁 AUTH STATE
fb.onAuthStateChanged(fb.auth, (user)=>{
  if(user){
    currentUser = { name:user.email, role:"Admin" };

    document.getElementById('loginScreen').style.display="none";
    document.getElementById('app').style.display="block";

    loadRequests();
  } else {
    document.getElementById('loginScreen').style.display="flex";
    document.getElementById('app').style.display="none";
  }
});

// 📥 LOAD DATA (REALTIME)
function loadRequests(){
  fb.onSnapshot(fb.collection(fb.db,"requests"), (snap)=>{
    reqs = snap.docs.map(d=>({id:d.id,...d.data()}));
    render();
  });
}

// ➕ ADD
async function saveNewReq(){
  const name = document.getElementById('inName').value;
  if(!name) return alert("Missing name");

  await fb.addDoc(fb.collection(fb.db,"requests"),{
    name,
    dept: document.getElementById('inDept').value,
    status: "Admission",
    history:[{
      step:"Registered",
      by:currentUser.name,
      time:new Date().toLocaleString()
    }]
  });
}

// 🔄 UPDATE
async function processStep(i){
  const ref = fb.doc(fb.db,"requests",reqs[i].id);

  await fb.updateDoc(ref,{
    status:"COMPLETE"
  });
}

// ❌ DELETE
async function delReq(i){
  await fb.deleteDoc(fb.doc(fb.db,"requests",reqs[i].id));
}

// 🎯 RENDER
function render(){
  document.getElementById('dashTable').innerHTML =
    reqs.map((r,i)=>`
      <tr>
        <td>${r.name}</td>
        <td>${r.dept}</td>
        <td>${r.status}</td>
        <td>
          <button onclick="processStep(${i})">Complete</button>
          <button onclick="delReq(${i})">Delete</button>
        </td>
      </tr>
    `).join('');
}

</script>

</body>
</html>
