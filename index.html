<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HU Registrar | Pro Suite 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db; --bg: #f4f7fa;
            --sidebar: #1a252f; --success: #27ae60; --danger: #e74c3c;
            --warning: #f39c12; --border: #e1e8ed; --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; background: var(--bg); height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar); color: white; display: flex; flex-direction: column; flex-shrink: 0; transition: 0.3s; position: relative; }
        .sidebar.collapsed { width: 70px; }
        .sidebar.collapsed .sidebar-brand, .sidebar.collapsed .nav-text { display: none; }
        .toggle-btn { position: absolute; right: -15px; top: 25px; background: var(--accent); color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid white; z-index: 100; }
        .sidebar-brand { padding: 30px 20px; font-size: 22px; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; color: var(--accent); }
        .nav-item { padding: 18px 25px; cursor: pointer; display: flex; align-items: center; color: #95a5a6; transition: 0.2s; white-space: nowrap; }
        .nav-item:hover { color: white; background: rgba(255,255,255,0.05); }
        .nav-item.active { background: rgba(255,255,255,0.05); color: white; border-left: 4px solid var(--accent); }
        .main { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 75px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .content { padding: 30px; overflow-y: auto; flex-grow: 1; }
        .card { background: white; border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; margin-bottom: 25px; padding: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; font-size: 14px; border-bottom: 2px solid #eee; color: #7f8c8d; }
        td { padding: 12px; border-bottom: 1px solid #f9f9f9; font-size: 14px; }
        .btn { padding: 10px 18px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
        .badge-success { background: #e8f5e9; color: #2e7d32; }
        .badge-danger { background: #ffebee; color: #c62828; }
        input, select, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 6px; width: 100%; margin-top: 8px; box-sizing: border-box; }
        .pane-container { display: flex; gap: 15px; margin-top: 10px; height: 200px; }
        .pane-box { flex: 1; border: 1px solid #dfe6e9; border-radius: 8px; background: #fff; overflow-y: auto; }
        .pane-header { background: #f8f9fa; padding: 8px; font-size: 11px; font-weight: 800; border-bottom: 1px solid #eee; position: sticky; top: 0; }
        .pane-item { padding: 8px 12px; border-bottom: 1px solid #f1f2f6; cursor: pointer; display: flex; justify-content: space-between; font-size: 13px; }
        .pane-item:hover { background: #f1f9ff; }
    </style>
</head>
<body>

    <div id="loginScreen" style="position:fixed; inset:0; background:var(--sidebar); display:flex; align-items:center; justify-content:center; z-index:10000;">
        <div style="background: white; padding: 40px; border-radius: 15px; width: 320px; text-align: center;">
            <h2 style="margin-bottom:20px;">HU Registrar</h2>
            <input type="text" id="lUser" placeholder="Login ID">
            <input type="password" id="lPass" placeholder="Password" style="margin:15px 0;">
            <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="doLogin()">Login</button>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="toggle-btn" onclick="document.getElementById('sidebar').classList.toggle('collapsed')"><i class="fas fa-bars"></i></div>
        <div class="sidebar-brand">HU Registrar</div>
        <div class="nav-item active" onclick="nav('view-dash', this)"><i class="fas fa-chart-pie"></i> <span class="nav-text">Dashboard</span></div>
        <div class="nav-item" onclick="nav('view-reg', this)"><i class="fas fa-user-plus"></i> <span class="nav-text">Registration</span></div>
        <div id="nav-u" class="nav-item" style="display:none;" onclick="nav('view-users', this)"><i class="fas fa-users-cog"></i> <span class="nav-text">Staff Manager</span></div>
        <div id="nav-s" class="nav-item" style="display:none;" onclick="nav('view-set', this)"><i class="fas fa-cogs"></i> <span class="nav-text">Settings</span></div>
        <div class="nav-item" style="margin-top:auto;" onclick="location.reload()"><i class="fas fa-power-off"></i> <span class="nav-text">Logout</span></div>
    </div>

    <div class="main">
        <div class="header"><h2 id="pageTitle">Dashboard</h2><div id="userBadge" style="font-weight:700; color:var(--accent);"></div></div>
        <div class="content">
            
            <div id="view-dash" class="section">
                <div class="card">
                    <input type="text" id="searchTerm" placeholder="Search entries..." oninput="render()" style="margin-bottom:15px;">
                    <table>
                        <thead><tr><th>Student Name</th><th>Dept</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody id="dashTable"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-reg" class="section" style="display:none;">
                <div class="card" style="max-width:800px; margin:auto;">
                    <h3>New Registration</h3>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <input id="inName" placeholder="NAME">
                        <input id="inDept" placeholder="DEPT">
                    </div>
                    <div class="pane-container">
                        <div class="pane-box"><div class="pane-header">SERVICES</div><div id="regAvailS"></div></div>
                        <div class="pane-box" style="background:#f0f7ff;"><div class="pane-header">SELECTED</div><div id="regSelS"></div></div>
                    </div>
                    <button class="btn btn-primary" style="width:100%; margin-top:15px; justify-content:center;" onclick="saveNewReq()">Register</button>
                </div>
            </div>

            <div id="view-users" class="section" style="display:none;">
                <div class="card">
                    <h3>Add New Staff</h3>
                    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:10px;">
                        <input id="uFull" placeholder="Full Name">
                        <input id="uId" placeholder="Login ID">
                        <input id="uPw" placeholder="Password">
                    </div>
                    <select id="uRoom" style="margin-bottom:10px;"></select>
                    <div class="pane-container">
                        <div class="pane-box"><div class="pane-header">AVAILABLE ROLES</div><div id="uAvailR"></div></div>
                        <div class="pane-box" style="background:#f0f7ff;"><div class="pane-header">ASSIGNED ROLES</div><div id="uSelR"></div></div>
                    </div>
                    <button class="btn btn-primary" style="margin-top:15px;" onclick="saveStaff()">Create Account</button>
                </div>

                <div class="card">
                    <h3>Manage Existing Staff</h3>
                    <table>
                        <thead><tr><th>Name</th><th>ID</th><th>Password</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody id="staffTable"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-set" class="section" style="display:none;">
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:20px;">
                    <div class="card"><h4>Services</h4><div style="display:flex; gap:5px;"><input id="setS"><button class="btn btn-primary" onclick="addSet('services','setS')">+</button></div><div id="listS"></div></div>
                    <div class="card"><h4>Roles</h4><div style="display:flex; gap:5px;"><input id="setR"><button class="btn btn-primary" onclick="addSet('roles','setR')">+</button></div><div id="listR"></div></div>
                    <div class="card"><h4>Rooms</h4><div style="display:flex; gap:5px;"><input id="setRm"><button class="btn btn-primary" onclick="addSet('rooms','setRm')">+</button></div><div id="listRm"></div></div>
                </div>
            </div>

        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCuA6hUsOEvLDGsXYpVTZa7a7ArUcrP-1c",
        authDomain: "hu-registrar.firebaseapp.com",
        databaseURL: "https://hu-registrar-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "hu-registrar",
        storageBucket: "hu-registrar.firebasestorage.app",
        messagingSenderId: "858714648335",
        appId: "1:858714648335:web:871d31a7a398ba8587987a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let config = { services: [], roles: [], rooms: [] };
    let users = []; let reqs = []; let currentUser = null;
    let tmpS = [], tmpR = [], showPw = {};

    function doLogin() {
        const u = document.getElementById('lUser').value;
        const p = document.getElementById('lPass').value;
        if(u === "admin" && p === "admin123") loginSuccess({name:"Admin", login:"admin", userRoles:["Admin"], isActive:true});
        else {
            const found = users.find(x => x.login === u && x.pass === p);
            if(found) { if(found.isActive) loginSuccess(found); else alert("Account Disabled"); }
            else alert("Failed");
        }
    }

    function loginSuccess(user) {
        currentUser = user;
        document.getElementById('loginScreen').style.display='none';
        const isAdmin = user.userRoles.includes("Admin");
        document.getElementById('nav-u').style.display = isAdmin ? "flex" : "none";
        document.getElementById('nav-s').style.display = isAdmin ? "flex" : "none";
        db.ref('config').on('value', s => { if(s.val()) config = s.val(); render(); });
        db.ref('users').on('value', s => { users = s.val() ? Object.values(s.val()) : []; render(); });
        db.ref('reqs').on('value', s => { reqs = s.val() ? Object.values(s.val()) : []; render(); });
    }

    function render() {
        if(!currentUser) return;
        document.getElementById('userBadge').innerText = currentUser.name;

        // Staff Table with Password Toggle and Active Switch
        document.getElementById('staffTable').innerHTML = users.map(u => `
            <tr>
                <td>${u.name}</td>
                <td>${u.login}</td>
                <td>
                    <span id="pw-${u.login}">${showPw[u.login] ? u.pass : '••••••••'}</span>
                    <i class="fas ${showPw[u.login]?'fa-eye-slash':'fa-eye'}" style="margin-left:8px; cursor:pointer; color:#7f8c8d;" onclick="togglePw('${u.login}')"></i>
                </td>
                <td>
                    <span class="badge ${u.isActive?'badge-success':'badge-danger'}">${u.isActive?'ACTIVE':'INACTIVE'}</span>
                </td>
                <td>
                    <button class="btn btn-sm ${u.isActive?'btn-secondary':'btn-primary'}" onclick="toggleStatus('${u.login}', ${u.isActive})">
                        ${u.isActive?'Disable':'Enable'}
                    </button>
                    <i class="fas fa-trash" style="color:red; cursor:pointer; margin-left:10px;" onclick="delUser('${u.login}')"></i>
                </td>
            </tr>
        `).join('');

        // Dashboard
        const term = document.getElementById('searchTerm').value.toUpperCase();
        document.getElementById('dashTable').innerHTML = reqs.filter(r => r.name.includes(term)).map(r => `
            <tr><td>${r.name}</td><td>${r.dept}</td><td><span class="badge">${r.step}</span></td><td><i class="fas fa-trash" style="color:red; cursor:pointer;" onclick="delReq('${r.id}')"></i></td></tr>
        `).join('');

        // Settings
        const dL = (id, arr, k) => { document.getElementById(id).innerHTML = arr.map((x, i) => `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee;">${x} <i class="fas fa-times" style="color:red; cursor:pointer;" onclick="remSet('${k}',${i})"></i></div>`).join(''); }
        dL('listS', config.services, 'services'); dL('listR', config.roles, 'roles'); dL('listRm', config.rooms, 'rooms');

        // Panes
        document.getElementById('regAvailS').innerHTML = config.services.filter(x => !tmpS.includes(x)).map(x => `<div class="pane-item" onclick="tmpS.push('${x}'); render();">${x} +</div>`).join('');
        document.getElementById('regSelS').innerHTML = tmpS.map(x => `<div class="pane-item" onclick="tmpS=tmpS.filter(v=>v!=='${x}'); render();">${x} -</div>`).join('');
        document.getElementById('uAvailR').innerHTML = config.roles.filter(x => !tmpR.includes(x)).map(x => `<div class="pane-item" onclick="tmpR.push('${x}'); render();">${x} +</div>`).join('');
        document.getElementById('uSelR').innerHTML = tmpR.map(x => `<div class="pane-item" onclick="tmpR=tmpR.filter(v=>v!=='${x}'); render();">${x} -</div>`).join('');
        document.getElementById('uRoom').innerHTML = config.rooms.map(r => `<option>${r}</option>`).join('');
    }

    function togglePw(id) { showPw[id] = !showPw[id]; render(); }
    
    function toggleStatus(id, current) {
        db.ref('users/'+id).update({ isActive: !current });
    }

    function saveStaff() {
        const id = document.getElementById('uId').value;
        db.ref('users/'+id).set({
            name: document.getElementById('uFull').value, login: id, pass: document.getElementById('uPw').value,
            office: document.getElementById('uRoom').value, userRoles: tmpR, isActive: true
        }).then(() => { tmpR = []; alert("Staff Saved"); });
    }

    function saveNewReq() {
        const id = "R" + Date.now();
        db.ref('reqs/'+id).set({ id, name: document.getElementById('inName').value.toUpperCase(), dept: document.getElementById('inDept').value, servs: tmpS, step: 'PENDING' })
        .then(() => { tmpS = []; nav('view-dash', document.querySelector('.nav-item')); });
    }

    function addSet(k, id) { const v = document.getElementById(id).value; if(v){ config[k].push(v); db.ref('config').set(config); document.getElementById(id).value=''; } }
    function remSet(k, i) { config[k].splice(i, 1); db.ref('config').set(config); }
    function delUser(id) { if(confirm("Delete?")) db.ref('users/'+id).remove(); }
    function delReq(id) { if(confirm("Delete?")) db.ref('reqs/'+id).remove(); }
    function nav(id, el) { document.querySelectorAll('.section').forEach(s => s.style.display='none'); document.getElementById(id).style.display='block'; document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
</script>
</body>
</html>
