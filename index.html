<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HU Registrar | Pro Suite 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db; --bg: #f4f7fa;
            --sidebar: #1a252f; --success: #27ae60; --danger: #e74c3c;
            --warning: #f39c12; --border: #e1e8ed; --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; background: var(--bg); height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar); color: white; display: flex; flex-direction: column; flex-shrink: 0; transition: 0.3s; position: relative; }
        .sidebar.collapsed { width: 70px; }
        .sidebar.collapsed .sidebar-brand, .sidebar.collapsed .nav-text { display: none; }
        .toggle-btn { position: absolute; right: -15px; top: 25px; background: var(--accent); color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid white; z-index: 100; }
        .sidebar-brand { padding: 30px 20px; font-size: 22px; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; color: var(--accent); }
        .nav-item { padding: 18px 25px; cursor: pointer; display: flex; align-items: center; color: #95a5a6; transition: 0.2s; white-space: nowrap; }
        .nav-item:hover { color: white; background: rgba(255,255,255,0.05); }
        .nav-item.active { background: rgba(255,255,255,0.05); color: white; border-left: 4px solid var(--accent); }
        .main { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 75px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .content { padding: 30px; overflow-y: auto; flex-grow: 1; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: var(--shadow); border-top: 4px solid var(--accent); }
        .stat-val { font-size: 24px; font-weight: 800; }
        .card { background: white; border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; margin-bottom: 25px; padding: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; font-size: 14px; border-bottom: 2px solid #eee; color: #7f8c8d; }
        td { padding: 12px; border-bottom: 1px solid #f9f9f9; font-size: 15px; }
        .btn { padding: 10px 18px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-family: inherit; }
        .btn-primary { background: var(--accent); color: white; }
        .badge { background: #eee; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        input, select, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 6px; width: 100%; margin-top: 8px; box-sizing: border-box; font-family: inherit; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 600px; max-height: 90vh; overflow-y: auto; }
        .pane-box { flex: 1; border: 1px solid #ddd; border-radius: 6px; height: 180px; overflow-y: auto; background: white; }
        .pane-item { padding: 10px; border-bottom: 1px solid #f1f1f1; cursor: pointer; display: flex; justify-content: space-between; font-size: 13px; }
        .row-complete { background-color: #e8f5e9 !important; border-left: 5px solid var(--success); }
        .row-locked { opacity: 0.6; pointer-events: none; background-color: #fcfcfc; }
        .time-tag { font-size: 10px; color: #95a5a6; display: block; margin-top: 2px; }
        @media print { body * { visibility: hidden; } #printArea, #printArea * { visibility: visible; } #printArea { position: absolute; left: 0; top: 0; width: 100%; padding: 40px; } }
    </style>
</head>
<body onload="checkSession()">
    <div id="printArea" style="display:none;"></div>
    <div id="loginScreen" style="position:fixed; inset:0; background:var(--sidebar); display:flex; align-items:center; justify-content:center; z-index:10000;">
        <div style="background: white; padding: 45px; border-radius: 20px; width: 350px; text-align: center;">
            <h2 style="color: var(--primary);">HU Registrar</h2>
            <input type="text" id="lUser" placeholder="Login ID" autofocus>
            <input type="password" id="lPass" placeholder="Password" style="margin: 20px 0;" onkeypress="if(event.key==='Enter') doLogin()">
            <button class="btn btn-primary" style="width:100%; justify-content: center;" onclick="doLogin()">Login</button>
        </div>
    </div>

    <div id="appModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-top:0;"></h3>
            <div id="modalBody"></div>
            <div id="modalFooter" style="margin-top:25px; display:flex; gap:10px; justify-content: flex-end;"></div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="toggle-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
        <div class="sidebar-brand">HU Registrar</div>
        <div class="nav-item active" onclick="nav('view-dash', this)"><i class="fas fa-chart-line"></i> <span class="nav-text">Dashboard</span></div>
        <div class="nav-item" onclick="nav('view-reg', this)"><i class="fas fa-user-plus"></i> <span class="nav-text">New Entry</span></div>
        <div id="nav-u" class="nav-item" style="display:none;" onclick="nav('view-users', this)"><i class="fas fa-users-cog"></i> <span class="nav-text">Staff Manager</span></div>
        <div id="nav-s" class="nav-item" style="display:none;" onclick="nav('view-set', this)"><i class="fas fa-cogs"></i> <span class="nav-text">System Settings</span></div>
        <div class="nav-item" style="margin-top:auto;" onclick="doLogout()"><i class="fas fa-power-off"></i> <span class="nav-text">Logout</span></div>
    </div>

    <div class="main">
        <div class="header">
            <h2 id="pageTitle">Dashboard</h2>
            <div id="userBadge" style="font-weight:700; color:var(--accent);"></div>
        </div>
        <div class="content">
            <div id="view-dash" class="section">
                <div class="stats-grid">
                    <div class="stat-card"><div>Total Cases</div><div class="stat-val" id="stTotal">0</div></div>
                    <div class="stat-card" style="border-color: var(--warning);"><div>In Transit</div><div class="stat-val" id="stProgress">0</div></div>
                    <div class="stat-card" style="border-color: var(--success);"><div>Completed</div><div class="stat-val" id="stDone">0</div></div>
                    <div class="stat-card" style="border-color: var(--danger);"><div>Active Staff</div><div class="stat-val" id="stStaff">0</div></div>
                </div>
                <div class="card">
                    <input type="text" id="searchTerm" placeholder="Search students..." oninput="render()" style="margin-bottom:15px;">
                    <table>
                        <thead><tr><th>Student Name</th><th>Details</th><th>Step</th><th>Allocation</th><th>Actions</th></tr></thead>
                        <tbody id="dashTable"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-reg" class="section" style="display:none;">
                <div class="card" style="max-width: 800px; margin: 0 auto;">
                    <h3>Registration</h3>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <input type="text" id="inName" placeholder="STUDENT NAME" style="text-transform: uppercase;">
                        <input type="text" id="inDept" placeholder="Department">
                    </div>
                    <div style="margin-top:15px;">
                        <div style="display:flex; gap:10px;">
                            <div class="pane-box" id="availServ"></div>
                            <div class="pane-box" id="selServ" style="background:#f0fdf4;"></div>
                        </div>
                    </div>
                    <button class="btn btn-primary" style="width:100%; margin-top:20px; justify-content:center;" onclick="saveNewReq()">Register</button>
                </div>
            </div>

            <div id="view-users" class="section" style="display:none;">
                <div class="card">
                    <h3>Staff Control</h3>
                    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                        <input type="text" id="uFull" placeholder="Full Name"><input type="text" id="uId" placeholder="Login ID"><input type="password" id="uPw" placeholder="Password">
                    </div>
                    <div style="margin-top:15px; display:flex; gap:10px;">
                        <div class="pane-box" id="availRoles"></div>
                        <div class="pane-box" id="selRoles" style="background:#eff6ff;"></div>
                    </div>
                    <button class="btn btn-primary" style="margin-top:15px;" onclick="saveStaff()">Create Staff</button>
                </div>
                <div class="card"><table><thead><tr><th>Name</th><th>Roles</th><th>Status</th><th>Actions</th></tr></thead><tbody id="staffTable"></tbody></table></div>
            </div>

            <div id="view-set" class="section" style="display:none;">
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:20px;">
                    <div class="card"><h4>Services</h4><div style="display:flex; gap:5px;"><input id="setS"><button class="btn btn-primary" onclick="addSet('services','setS')">+</button></div><div id="listS"></div></div>
                    <div class="card"><h4>Workflows</h4><div style="display:flex; gap:5px;"><input id="setR"><button class="btn btn-primary" onclick="addSet('roles','setR')">+</button></div><div id="listR"></div></div>
                    <div class="card"><h4>Offices</h4><div style="display:flex; gap:5px;"><input id="setRm"><button class="btn btn-primary" onclick="addSet('rooms','setRm')">+</button></div><div id="listRm"></div></div>
                </div>
                <button class="btn btn-primary" style="margin-top:20px;" onclick="exportData()">Export Backup</button>
            </div>
        </div>
    </div>

<script>
    let config = JSON.parse(localStorage.getItem('hu_config')) || { services: ["Degree", "Transcript", "Letter"], roles: ["Registrar", "Finance", "Library"], rooms: ["R-01", "R-02", "R-03"] };
    let users = JSON.parse(localStorage.getItem('hu_users')) || [{name:"Admin", login:"admin", pass:"admin123", userRoles:["Admin"], office:"HQ", isActive:true}];
    let reqs = JSON.parse(localStorage.getItem('hu_reqs')) || [];
    let currentUser = null, tmpS = [], tmpR = [];

    function timeAgo(date) {
        const seconds = Math.floor((new Date() - new Date(date)) / 1000);
        if (seconds < 60) return "Just now";
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return minutes + "m ago";
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return hours + "h ago";
        return Math.floor(hours / 24) + "d ago";
    }

    function doLogin() {
        const u = document.getElementById('lUser').value, p = document.getElementById('lPass').value;
        const found = users.find(x => x.login === u && x.pass === p);
        if(found && found.isActive) {
            currentUser = found; sessionStorage.setItem('activeUser', JSON.stringify(found));
            document.getElementById('loginScreen').style.display='none'; render();
        } else alert("Denied");
    }

    function checkSession() {
        const saved = sessionStorage.getItem('activeUser');
        if(saved) { currentUser = JSON.parse(saved); document.getElementById('loginScreen').style.display='none'; render(); }
    }

    function doLogout() { sessionStorage.clear(); location.reload(); }

    function render() {
        if(!currentUser) return;
        const term = document.getElementById('searchTerm').value.toUpperCase();
        document.getElementById('stTotal').innerText = reqs.length;
        document.getElementById('stProgress').innerText = reqs.filter(r => r.step !== 'COMPLETE').length;
        document.getElementById('stDone').innerText = reqs.filter(r => r.step === 'COMPLETE').length;
        document.getElementById('stStaff').innerText = users.filter(u=>u.isActive).length;
        document.getElementById('userBadge').innerText = currentUser.name;
        document.getElementById('nav-u').style.display = currentUser.userRoles.includes("Admin") ? "flex" : "none";
        document.getElementById('nav-s').style.display = currentUser.userRoles.includes("Admin") ? "flex" : "none";

        document.getElementById('dashTable').innerHTML = reqs.filter(r => r.name.includes(term)).map((r, i) => {
            const isDone = r.step === 'COMPLETE';
            const isLocked = !currentUser.userRoles.includes("Admin") && !currentUser.userRoles.includes(r.step) && !isDone;
            const lastUpdate = r.history[r.history.length-1].time;
            return `<tr class="${isDone ? 'row-complete' : ''} ${isLocked ? 'row-locked' : ''}">
                <td><b onclick="openHist(${i})" style="cursor:pointer; color:var(--accent);">${r.name}</b><br><span class="time-tag">${timeAgo(lastUpdate)}</span></td>
                <td>${r.servs.join(", ")} <i class="fas fa-edit" onclick="editServs(${i})" style="cursor:pointer; font-size:11px; color:#aaa;"></i></td>
                <td><span class="badge">${r.step}</span></td>
                <td><select id="nr-${i}">${config.roles.map(x=>`<option ${r.step===x?'selected':''}>${x}</option>`).join('')}<option value="COMPLETE" ${isDone?'selected':''}>COMPLETE</option></select></td>
                <td>
                    <div style="display:flex; gap:10px; align-items:center;">
                        ${!isDone ? `<button class="btn btn-primary" style="padding:5px 10px;" onclick="forward(${i})">Send</button>` : '✓'}
                        <i class="fas fa-print" onclick="printSlip(${i})" style="cursor:pointer; color:#7f8c8d;"></i>
                        ${currentUser.userRoles.includes("Admin") ? `<i class="fas fa-trash" onclick="delReq(${i})" style="color:red; cursor:pointer;"></i>` : ''}
                    </div>
                </td>
            </tr>`;
        }).join('');

        document.getElementById('staffTable').innerHTML = users.map((u, i) => `<tr><td>${u.name}</td><td>${u.userRoles.join(", ")}</td><td>${u.isActive}</td><td><button onclick="toggleUser(${i})">Toggle</button></td></tr>`).join('');
        document.getElementById('listS').innerHTML = config.services.map(x => `<div>${x}</div>`).join('');
        document.getElementById('listR').innerHTML = config.roles.map(x => `<div>${x}</div>`).join('');
        document.getElementById('listRm').innerHTML = config.rooms.map(x => `<div>${x}</div>`).join('');
        renderPanes();
    }

    function renderPanes() {
        document.getElementById('availServ').innerHTML = config.services.filter(x => !tmpS.includes(x)).map(x => `<div class="pane-item" onclick="tmpS.push('${x}'); renderPanes();">${x} +</div>`).join('');
        document.getElementById('selServ').innerHTML = tmpS.map(x => `<div class="pane-item" onclick="tmpS=tmpS.filter(v=>v!=='${x}'); renderPanes();">${x} x</div>`).join('');
        document.getElementById('availRoles').innerHTML = config.roles.filter(x=>!tmpR.includes(x)).map(x=>`<div class="pane-item" onclick="tmpR.push('${x}'); renderPanes();">${x} +</div>`).join('');
        document.getElementById('selRoles').innerHTML = tmpR.map(x=>`<div class="pane-item" onclick="tmpR=tmpR.filter(v=>v!=='${x}'); renderPanes();">${x} x</div>`).join('');
    }

    function editServs(i) {
        tmpS = [...reqs[i].servs];
        document.getElementById('modalTitle').innerText = "Update Services";
        document.getElementById('modalBody').innerHTML = `<div style="display:flex; gap:10px;"><div class="pane-box" id="eAvail"></div><div class="pane-box" id="eSel"></div></div>`;
        const up = () => {
            document.getElementById('eAvail').innerHTML = config.services.filter(x => !tmpS.includes(x)).map(x => `<div class="pane-item" onclick="tmpS.push('${x}'); up();">${x} +</div>`).join('');
            document.getElementById('eSel').innerHTML = tmpS.map(x => `<div class="pane-item" onclick="tmpS=tmpS.filter(v=>v!=='${x}'); up();">${x} x</div>`).join('');
        };
        up();
        document.getElementById('modalFooter').innerHTML = `<button class="btn btn-primary" onclick="reqs[${i}].servs=[...tmpS]; saveAll(); closeModal(); render();">Save Changes</button>`;
        document.getElementById('appModal').style.display='flex';
    }

    function forward(i) {
        const nr = document.getElementById(`nr-${i}`).value;
        const note = prompt("Note:");
        reqs[i].step = nr;
        reqs[i].history.push({step: nr, by: currentUser.name, time: new Date(), note: note || "Forwarded"});
        saveAll(); render();
    }

    function openHist(i) {
        document.getElementById('modalTitle').innerText = "Timeline: " + reqs[i].name;
        document.getElementById('modalBody').innerHTML = reqs[i].history.map(h => `<div><b>${h.step}</b> - ${h.by} <br><small>${new Date(h.time).toLocaleString()}</small><br><i>${h.note||''}</i></div><hr>`).join('');
        document.getElementById('modalFooter').innerHTML = `<button class="btn" onclick="closeModal()">Close</button>`;
        document.getElementById('appModal').style.display='flex';
    }

    function printSlip(i) {
        const r = reqs[i];
        document.getElementById('printArea').innerHTML = `<div style="border:2px solid #000; padding:20px; text-align:center;"><h2>HU REGISTRAR</h2><p>Student: ${r.name}</p><p>Services: ${r.servs.join(", ")}</p><p>Date: ${new Date().toLocaleDateString()}</p></div>`;
        window.print();
    }

    function saveNewReq() {
        reqs.push({name: document.getElementById('inName').value.toUpperCase(), dept: document.getElementById('inDept').value, servs: [...tmpS], step: config.roles[0], room: config.rooms[0], history: [{step: "Registered", by: currentUser.name, time: new Date()}]});
        tmpS = []; saveAll(); render(); nav('view-dash', document.querySelector('.nav-item'));
    }

    function saveStaff() { users.push({name: document.getElementById('uFull').value, login: document.getElementById('uId').value, pass: document.getElementById('uPw').value, userRoles: [...tmpR], isActive: true}); tmpR = []; saveAll(); render(); }
    function saveAll() { localStorage.setItem('hu_reqs', JSON.stringify(reqs)); localStorage.setItem('hu_users', JSON.stringify(users)); localStorage.setItem('hu_config', JSON.stringify(config)); }
    function addSet(k, id) { if(document.getElementById(id).value) { config[k].push(document.getElementById(id).value); saveAll(); render(); document.getElementById(id).value=''; } }
    function toggleUser(i) { users[i].isActive = !users[i].isActive; saveAll(); render(); }
    function delReq(i) { if(confirm("Delete case?")) { reqs.splice(i,1); saveAll(); render(); } }
    function nav(id, el) { document.querySelectorAll('.section').forEach(s => s.style.display='none'); document.getElementById(id).style.display='block'; document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); render(); }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
    function closeModal() { document.getElementById('appModal').style.display='none'; }
    function exportData() { console.log(JSON.stringify({config, users, reqs})); alert("Data logged to browser console."); }
</script>
</body>
</html>
