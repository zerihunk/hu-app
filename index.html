<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HU Registrar | Pro Suite 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db; --bg: #f4f7fa;
            --sidebar: #1a252f; --success: #27ae60; --danger: #e74c3c;
            --warning: #f39c12; --border: #e1e8ed; --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; background: var(--bg); height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar); color: white; display: flex; flex-direction: column; flex-shrink: 0; transition: 0.3s; position: relative; }
        .sidebar.collapsed { width: 70px; }
        .sidebar.collapsed .sidebar-brand, .sidebar.collapsed .nav-text { display: none; }
        .toggle-btn { position: absolute; right: -15px; top: 25px; background: var(--accent); color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid white; z-index: 100; }
        .sidebar-brand { padding: 30px 20px; font-size: 22px; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; color: var(--accent); }
        .nav-item { padding: 18px 25px; cursor: pointer; display: flex; align-items: center; color: #95a5a6; transition: 0.2s; white-space: nowrap; }
        .nav-item.active { background: rgba(255,255,255,0.05); color: white; border-left: 4px solid var(--accent); }
        .main { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 75px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .content { padding: 30px; overflow-y: auto; flex-grow: 1; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: var(--shadow); border-top: 4px solid var(--accent); }
        .stat-val { font-size: 24px; font-weight: 800; }
        .card { background: white; border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; margin-bottom: 25px; padding: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; font-size: 13px; border-bottom: 2px solid #eee; color: #7f8c8d; }
        td { padding: 12px; border-bottom: 1px solid #f9f9f9; font-size: 14px; }
        .btn { padding: 10px 18px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--accent); color: white; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; width: 100%; margin-top: 5px; box-sizing: border-box; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 500px; max-height: 80vh; overflow-y: auto; }
        .set-list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #f8f9fa; margin-top: 5px; border-radius: 5px; border: 1px solid #eee; }
        .pane-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        .pane-box { border: 1px solid #ddd; border-radius: 8px; height: 200px; overflow-y: auto; background: #fff; }
        .pane-item { padding: 10px; border-bottom: 1px solid #f1f1f1; cursor: pointer; font-size: 12px; display: flex; justify-content: space-between; }
        .badge-s { background: #e1f5fe; color: #0288d1; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin: 2px; display: inline-block; }
    </style>
</head>
<body>

    <div id="loginScreen" style="position:fixed; inset:0; background:var(--sidebar); display:flex; align-items:center; justify-content:center; z-index:10000;">
        <div style="background: white; padding: 45px; border-radius: 20px; width: 350px; text-align: center;">
            <h2 style="color: var(--primary);">HU Registrar</h2>
            <input type="text" id="lUser" placeholder="Login ID">
            <input type="password" id="lPass" placeholder="Password" style="margin: 20px 0;">
            <button class="btn btn-primary" style="width:100%; justify-content: center;" onclick="doLogin()">Login</button>
        </div>
    </div>

    <div id="appModal" class="modal"><div class="modal-content" id="modalUI"></div></div>

    <div class="sidebar" id="sidebar">
        <div class="toggle-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
        <div class="sidebar-brand">HU Registrar</div>
        <div class="nav-item active" onclick="nav('view-dash', this)"><i class="fas fa-chart-line"></i> <span class="nav-text">Dashboard</span></div>
        <div class="nav-item" onclick="nav('view-reg', this)"><i class="fas fa-user-plus"></i> <span class="nav-text">New Entry</span></div>
        <div id="nav-u" class="nav-item" style="display:none;" onclick="nav('view-users', this)"><i class="fas fa-users-cog"></i> <span class="nav-text">Staff</span></div>
        <div id="nav-s" class="nav-item" style="display:none;" onclick="nav('view-set', this)"><i class="fas fa-cogs"></i> <span class="nav-text">Settings</span></div>
        <div class="nav-item" style="margin-top:auto;" onclick="location.reload()"><i class="fas fa-power-off"></i> <span class="nav-text">Logout</span></div>
    </div>

    <div class="main">
        <div class="header">
            <h2 id="pageTitle">Dashboard</h2>
            <div id="userBadge" style="font-weight:700; color:var(--accent);"></div>
        </div>
        
        <div class="content">
            <div id="view-dash" class="section">
                <div class="stats-grid">
                    <div class="stat-card"><div>Total Cases</div><div class="stat-val" id="stTotal">0</div></div>
                    <div class="stat-card" style="border-color: var(--warning);"><div>Active</div><div class="stat-val" id="stActive">0</div></div>
                    <div class="stat-card" style="border-color: var(--success);"><div>Completed</div><div class="stat-val" id="stDone">0</div></div>
                    <div class="stat-card" style="border-color: var(--danger);"><div>Users</div><div class="stat-val" id="stUsers">0</div></div>
                </div>
                <div class="card">
                    <input type="text" id="searchTerm" placeholder="Search students..." oninput="render()" style="margin-bottom: 20px;">
                    <table>
                        <thead><tr><th>Student Name</th><th>Services</th><th>Current Office</th><th>Forward To</th><th>Action</th></tr></thead>
                        <tbody id="dashTable"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-set" class="section" style="display:none;">
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:15px;">
                    <div class="card">
                        <h4>Manage Services</h4>
                        <div style="display:flex; gap:5px;"><input id="setS" placeholder="Service Name"><button class="btn btn-primary" onclick="addSet('services','setS')">+</button></div>
                        <div id="listS"></div>
                    </div>
                    <div class="card">
                        <h4>Manage Roles</h4>
                        <div style="display:flex; gap:5px;"><input id="setR" placeholder="Role Name"><button class="btn btn-primary" onclick="addSet('roles','setR')">+</button></div>
                        <div id="listR"></div>
                    </div>
                    <div class="card">
                        <h4>Manage Offices</h4>
                        <input id="setOName" placeholder="Office Name">
                        <div style="display:flex; gap:5px; margin-top:5px;">
                            <input id="setONum" placeholder="Office No.">
                            <button class="btn btn-primary" onclick="addOffice()">+</button>
                        </div>
                        <div id="listO" style="margin-top:10px;"></div>
                    </div>
                </div>
            </div>

            <div id="view-reg" class="section" style="display:none;">
                <div class="card" style="max-width: 800px; margin: 0 auto;">
                    <h3>New Entry</h3>
                    <input type="text" id="inName" placeholder="FULL NAME" style="text-transform: uppercase;">
                    <input type="text" id="inDept" placeholder="Department">
                    <div class="pane-container">
                        <div><small>Available Services</small><div class="pane-box" id="availS"></div></div>
                        <div><small>Selected Services</small><div class="pane-box" id="selS" style="background:#f0f9ff;"></div></div>
                    </div>
                    <button class="btn btn-primary" style="width:100%; margin-top:20px;" onclick="saveEntry()">Save Student</button>
                </div>
            </div>

            <div id="view-users" class="section" style="display:none;">
                <div class="card">
                    <h3>Staff Management</h3>
                    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap:10px;">
                        <input type="text" id="uName" placeholder="Name"><input type="text" id="uId" placeholder="ID"><input type="password" id="uPw" placeholder="PW"><button class="btn btn-primary" onclick="addUser()">Add</button>
                    </div>
                    <table style="margin-top:20px;"><thead><tr><th>Name</th><th>ID</th></tr></thead><tbody id="userTable"></tbody></table>
                </div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCuA6hUsOEvLDGsXYpVTZa7a7ArUcrP-1c",
        authDomain: "hu-registrar.firebaseapp.com",
        databaseURL: "https://hu-registrar-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "hu-registrar",
        storageBucket: "hu-registrar.firebasestorage.app",
        messagingSenderId: "858714648335",
        appId: "1:858714648335:web:871d31a7a398ba8587987a"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let state = { config: {services:[], roles:[], offices:[]}, users: [], reqs: [], currentUser: null, selectedServices: [] };

    function doLogin() {
        const u = document.getElementById('lUser').value.trim();
        const p = document.getElementById('lPass').value.trim();
        if(u === "admin" && p === "admin123") loginSuccess({name:"Admin", login:"admin", roles:["Admin"]});
        else {
            const found = state.users.find(x => x.login === u && x.pass === p);
            if(found) loginSuccess(found); else alert("Wrong Login!");
        }
    }

    function loginSuccess(user) {
        state.currentUser = user;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('userBadge').innerText = user.name;
        if(user.roles.includes("Admin")) { document.getElementById('nav-u').style.display='flex'; document.getElementById('nav-s').style.display='flex'; }
        syncData();
    }

    function syncData() {
        db.ref('config').on('value', s => { 
            state.config = s.val() || {services:[], roles:[], offices:[]}; 
            if(!state.config.offices) state.config.offices = [];
            render(); 
        });
        db.ref('users').on('value', s => { state.users = s.val() ? Object.values(s.val()) : []; render(); });
        db.ref('reqs').on('value', s => { state.reqs = s.val() ? Object.values(s.val()) : []; render(); });
    }

    function render() {
        if(!state.currentUser) return;
        const term = document.getElementById('searchTerm').value.toUpperCase();

        document.getElementById('stTotal').innerText = state.reqs.length;
        document.getElementById('stActive').innerText = state.reqs.filter(r => r.step !== 'COMPLETE').length;
        document.getElementById('stDone').innerText = state.reqs.filter(r => r.step === 'COMPLETE').length;
        document.getElementById('stUsers').innerText = state.users.length;

        // Dashboard
        document.getElementById('dashTable').innerHTML = state.reqs.filter(r => r.name.includes(term)).map(r => `
            <tr>
                <td onclick="viewHistory('${r.id}')" style="cursor:pointer; color:var(--accent); font-weight:700;">${r.name}</td>
                <td>${(r.servs || []).map(s => `<span class="badge-s">${s}</span>`).join('')}</td>
                <td><span style="font-size:11px; background:#eee; padding:2px 5px; border-radius:4px;">${r.step}</span></td>
                <td>
                    <select id="sel-${r.id}">
                        ${state.config.offices.map(o=>`<option value="${o.name} (No. ${o.num})">${o.name} (#${o.num})</option>`).join('')}
                        <option value="COMPLETE">COMPLETE</option>
                    </select>
                </td>
                <td><button class="btn btn-primary" onclick="forward('${r.id}')"><i class="fas fa-paper-plane"></i></button></td>
            </tr>
        `).join('');

        // Settings Lists
        const drawList = (id, arr, key) => {
            document.getElementById(id).innerHTML = (arr || []).map((x, i) => `
                <div class="set-list-item">${typeof x === 'object' ? x.name + ' (#' + x.num + ')' : x} 
                <i class="fas fa-trash" onclick="remSet('${key}',${i})" style="color:red; cursor:pointer;"></i></div>
            `).join('');
        };
        drawList('listS', state.config.services, 'services');
        drawList('listR', state.config.roles, 'roles');
        drawList('listO', state.config.offices, 'offices');

        // Services Panes
        document.getElementById('availS').innerHTML = (state.config.services || []).filter(s => !state.selectedServices.includes(s)).map(s => `
            <div class="pane-item" onclick="toggleServ('${s}', true)">${s} <i class="fas fa-plus"></i></div>`).join('');
        document.getElementById('selS').innerHTML = state.selectedServices.map(s => `
            <div class="pane-item" onclick="toggleServ('${s}', false)">${s} <i class="fas fa-minus" style="color:red"></i></div>`).join('');

        document.getElementById('userTable').innerHTML = state.users.map(u => `<tr><td>${u.name}</td><td>${u.login}</td></tr>`).join('');
    }

    // Office specific add
    function addOffice() {
        const name = document.getElementById('setOName').value.trim();
        const num = document.getElementById('setONum').value.trim();
        if(name && num) {
            if(!state.config.offices) state.config.offices = [];
            state.config.offices.push({name: name, num: num});
            db.ref('config').set(state.config);
            document.getElementById('setOName').value = '';
            document.getElementById('setONum').value = '';
        }
    }

    function addSet(k, id) {
        const v = document.getElementById(id).value.trim();
        if(v) {
            if(!state.config[k]) state.config[k] = [];
            state.config[k].push(v);
            db.ref('config').set(state.config);
            document.getElementById(id).value = '';
        }
    }

    function remSet(k, i) { state.config[k].splice(i, 1); db.ref('config').set(state.config); }

    function forward(id) {
        const next = document.getElementById('sel-'+id).value;
        const note = prompt("Forwarding Note:");
        if(note === null) return;
        const r = state.reqs.find(x => x.id === id);
        r.step = next;
        r.history.push({step: next, by: state.currentUser.name, time: new Date().toLocaleString(), note: note || "Forwarded"});
        db.ref('reqs/'+id).set(r);
    }

    function saveEntry() {
        const name = document.getElementById('inName').value.trim();
        if(!name || state.selectedServices.length === 0) return alert("Fill Name and Services");
        const id = "ST" + Date.now();
        const startOffice = state.config.offices[0] ? `${state.config.offices[0].name} (No. ${state.config.offices[0].num})` : "Registration";
        const entry = {
            id: id, name: name.toUpperCase(), dept: document.getElementById('inDept').value,
            servs: [...state.selectedServices], step: startOffice,
            history: [{step: "Registered", by: state.currentUser.name, time: new Date().toLocaleString(), note: "New Case"}]
        };
        db.ref('reqs/' + id).set(entry).then(() => {
            state.selectedServices = [];
            document.getElementById('inName').value = '';
            nav('view-dash', document.querySelector('.nav-item'));
        });
    }

    function viewHistory(id) {
        const r = state.reqs.find(x => x.id === id);
        document.getElementById('modalUI').innerHTML = `<h3>${r.name} Timeline</h3>` + 
            r.history.map(h => `<div style="border-bottom:1px solid #eee; padding:10px;"><b>${h.step}</b><br><small>${h.time}</small><br><i>${h.note}</i></div>`).join('') +
            `<button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="closeModal()">Close</button>`;
        document.getElementById('appModal').style.display = 'flex';
    }

    function toggleServ(s, add) { if(add) state.selectedServices.push(s); else state.selectedServices = state.selectedServices.filter(x => x !== s); render(); }
    function nav(id, el) { 
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none'); 
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('pageTitle').innerText = el.innerText;
    }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
    function closeModal() { document.getElementById('appModal').style.display = 'none'; }
    function addUser() {
        const id = document.getElementById('uId').value;
        db.ref('users/'+id).set({name: document.getElementById('uName').value, login: id, pass: document.getElementById('uPw').value, roles:["Staff"]});
    }
</script>
</body>
</html>
